spring.application.name=Librairy_felix_liden
spring.config.import=optional:vault://

spring.cloud.vault.enabled=${VAULT_ENABLED:true}
spring.cloud.vault.uri=${VAULT_URI:http://127.0.0.1:8200}
spring.cloud.vault.authentication=TOKEN
spring.cloud.vault.token=${VAULT_TOKEN:}
spring.cloud.vault.fail-fast=true
spring.cloud.vault.kv.enabled=true
spring.cloud.vault.kv.backend=secret
spring.cloud.vault.kv.application-name=${spring.application.name}

spring.datasource.url=jdbc:h2:mem:librarydb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
app.security.cors.allowed-origin=http://localhost:3000
